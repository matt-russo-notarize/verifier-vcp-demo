version: 1
backend:
  phases:
    build:
      commands:
        - yarn install --frozen-lockfile --prefer-offline --cache-folder .yarn-cache
        - yarn ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .yarn-cache/**/*
      - .next/cache/**/*
